name: story_app
description: A Flutter application for story mode.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  video_player: ^2.5.1
  audioplayers: ^6.1.0
  record: ^4.0.0
  permission_handler: ^10.2.0
  image_picker: ^0.8.7+5
  file_picker: ^5.2.2
  provider: ^6.1.2
  uuid: ^4.2.2
  google_fonts: ^5.1.0
  lottie: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
